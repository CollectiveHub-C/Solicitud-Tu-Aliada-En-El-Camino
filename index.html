<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solicitud de Crédito — Tu Aliada en el Camino</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --red:#C0392B;--red2:#E74C3C;--red-light:#FDEDEC;--red-border:#F1948A;
      --gray:#f7f5f3;--gray2:#ece9e5;--text:#1a1a1a;--muted:#7a7268;--border:#ddd8d2;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}
    .topbar{background:var(--red);position:sticky;top:0;z-index:100;}
    .topbar-inner{max-width:520px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-img{width:42px;height:42px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text h1{font-size:14px;font-weight:600;color:white;line-height:1.2;}
    .logo-text p{font-size:11px;color:rgba(255,255,255,0.8);}
    .folio-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;}
    .progress-wrap{background:var(--red2);}
    .progress-inner{max-width:520px;margin:0 auto;display:flex;}
    .step-tab{flex:1;padding:8px 4px;text-align:center;font-size:10px;color:rgba(255,255,255,0.5);border-bottom:3px solid transparent;}
    .step-tab.active{color:white;border-bottom-color:white;}
    .step-num{display:block;font-size:15px;font-weight:700;}
    .content{max-width:520px;margin:0 auto;padding:16px 14px 100px;}
    .screen{display:none;}
    .screen.active{display:block;}
    .section{background:white;border-radius:12px;margin-bottom:14px;border:1px solid var(--border);}
    .sec-head{background:var(--red);padding:10px 14px;color:white;font-size:12px;font-weight:600;}
    .sec-body{padding:14px;}
    .fg{display:grid;gap:10px;margin-bottom:10px;}
    .fg.c2{grid-template-columns:1fr 1fr;}
    .field{display:flex;flex-direction:column;}
    .field label{font-size:10px;font-weight:600;color:var(--muted);}
    .field input,.field select{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;}
    .btn-next{width:100%;padding:12px;background:var(--red);color:white;border:none;border-radius:9px;font-size:14px;font-weight:600;}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;}
    .overlay.show{display:flex;}
    .ov-box{background:white;border-radius:14px;padding:28px 24px;text-align:center;}
    .spin{width:38px;height:38px;border:4px solid var(--red-light);border-top:4px solid var(--red);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
    @keyframes sp{to{transform:rotate(360deg);}}
  </style>
</head>

<body>

<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="spin"></div>
    <p>Guardando solicitud...</p>
  </div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-text">
        <h1>Tu Aliada en el Camino</h1>
        <p>Solicitud de crédito</p>
      </div>
    </div>
    <div class="folio-badge" id="folio-top">Nueva</div>
  </div>
</div>

<div class="content">
  <div class="screen active" id="sc1">
    <div class="section">
      <div class="sec-head">Información general</div>
      <div class="sec-body">
        <div class="fg c2">
          <div class="field"><label>Grupo</label><input id="grupo"></div>
          <div class="field"><label>Fecha</label><input type="date" id="fecha"></div>
        </div>
        <div class="field"><label>Asesora</label><input id="asesor"></div>
        <button class="btn-next" onclick="enviar()">Enviar solicitud</button>
      </div>
    </div>
  </div>
</div>

<script>
const POWER_AUTOMATE_URL='https://defaultae1be7b5fa10473da5ad5a530b8dfe.7d.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/93ae7c54f0f54296a528978772f27f10/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=9AW0NRWixnYwKQ4Vqafwj1Z1OZgvOLm-zrXD9yhphjc';

function genFolio(){
  const d=new Date();
  return 'ACT'+d.getFullYear().toString().slice(2)+(d.getMonth()+1).toString().padStart(2,'0')+'-'+Math.floor(Math.random()*9000+1000);
}

async function enviar(){
  const folio=genFolio();
  const payload={
    folio,
    fecha:document.getElementById('fecha').value,
    grupo:document.getElementById('grupo').value,
    asesor:document.getElementById('asesor').value,
    estado:'Enviada'
  };

  document.getElementById('overlay').classList.add('show');
  await fetch(POWER_AUTOMATE_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  document.getElementById('overlay').classList.remove('show');
  alert('Solicitud enviada\nFolio: '+folio);
}
</script>

</body>
</html>
